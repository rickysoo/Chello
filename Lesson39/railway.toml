# railway.toml
# Tells Railway how to build and start the C# API.
# Place this file at the root of the repository (or the service root).
# Docs: https://docs.railway.com/reference/config-as-code

[build]
# dotnet publish compiles the app and outputs a ready-to-run folder
builder = "NIXPACKS"
buildCommand = "dotnet publish Lesson39/api/Lesson39Api.csproj -c Release -o out"

[deploy]
# Railway sets $PORT automatically; the app reads it in Program.cs
startCommand = "dotnet out/Lesson39Api.dll"
healthcheckPath = "/health"
healthcheckTimeout = 30   # seconds to wait for the first healthy response
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
