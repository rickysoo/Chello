<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chello — Lesson Simulator</title>

  <!-- ============================================================
       LESSON SIMULATOR
       The C#, SQL and Web API lessons can't run inside a browser,
       so this page does the next best thing:
         1. Fetches the lesson's REAL source code and shows it
            with syntax highlighting.
         2. Shows a realistic SIMULATED run / output so you can see
            what the program would print without installing anything.

       Usage:  simulator.html?lesson=1   (lesson id 1-40)

       Requires running from a local server (so fetch() can read the
       source files). From the repo root:  python -m http.server 8080
       ============================================================ -->

  <!-- highlight.js for code colouring -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root{
      --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --dim:#94a3b8;
      --primary:#38bdf8; --primary-2:#0ea5e9; --border:#334155;
      --term-bg:#0b1120; --green:#22c55e; --radius:14px;
    }
    [data-theme="light"]{
      --bg:#f1f5f9; --card:#fff; --text:#0f172a; --dim:#475569;
      --primary:#0284c7; --primary-2:#0369a1; --border:#e2e8f0;
      --term-bg:#0b1120;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;}
    header{background:linear-gradient(135deg,#0c4a6e,#075985);padding:22px 20px;border-bottom:1px solid var(--border);}
    [data-theme="light"] header{background:linear-gradient(135deg,#0ea5e9,#0284c7);}
    .head-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
    .back{color:#e0f2fe;text-decoration:none;font-weight:600;font-size:.9rem;}
    .back:hover{color:#fff;}
    header h1{color:#fff;font-size:1.3rem;}
    header .num{color:#bae6fd;font-size:.8rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
    .container{max-width:1100px;margin:0 auto;padding:26px 20px 60px;}
    .desc{color:var(--dim);margin-bottom:22px;font-size:1.02rem;}
    .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:22px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.3);}
    .panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);}
    .panel-head h2{font-size:.95rem;display:flex;align-items:center;gap:8px;}
    .file-name{color:var(--dim);font-size:.8rem;font-family:monospace;}
    pre{margin:0;max-height:520px;overflow:auto;}
    pre code{font-family:'Consolas','Monaco',monospace;font-size:.82rem;padding:16px !important;display:block;}
    /* Terminal */
    .term{background:var(--term-bg);color:#d1fae5;font-family:'Consolas','Monaco',monospace;font-size:.85rem;padding:0;}
    .term-bar{display:flex;align-items:center;gap:7px;padding:10px 14px;border-bottom:1px solid #1e293b;}
    .dot{width:11px;height:11px;border-radius:50%;}
    .dot.r{background:#ef4444;} .dot.y{background:#eab308;} .dot.g{background:#22c55e;}
    .term-cmd{color:#94a3b8;margin-left:8px;}
    .term-body{padding:16px;white-space:pre-wrap;line-height:1.5;overflow:auto;max-height:520px;}
    .run-btn{background:var(--primary);color:#04222e;border:none;border-radius:8px;padding:7px 16px;font-weight:700;cursor:pointer;font-size:.82rem;}
    .run-btn:hover{background:var(--primary-2);}
    .input-line{color:#fcd34d;} /* user-typed input highlighted */
    .note{background:rgba(56,189,248,.08);border:1px solid var(--primary);border-radius:10px;padding:12px 16px;color:var(--text);font-size:.9rem;margin-bottom:22px;}
    .err{background:rgba(239,68,68,.1);border:1px solid #ef4444;border-radius:10px;padding:14px 16px;color:var(--text);}
    .err a{color:var(--primary);}
    .links{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
    .links a{color:var(--primary);text-decoration:none;font-size:.85rem;border:1px solid var(--border);padding:6px 12px;border-radius:8px;}
    .links a:hover{border-color:var(--primary);}
  </style>
</head>

    const GITHUB = "https://github.com/rickysoo/Chello/blob/master/";

    // Apply saved theme so it matches the dashboard
    document.body.setAttribute("data-theme", localStorage.getItem("chello-theme") || "dark");

    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get("lesson"), 10);
    const sim = SIM[id];
    const content = document.getElementById("content");

    if (!sim) {
      document.getElementById("lessonTitle").textContent = "Lesson not found";
      content.innerHTML = `<div class="err">No simulation found for lesson ${id||"(none)"}.
        <div class="links"><a href="index.html">← Back to Dashboard</a></div></div>`;
    } else {
      document.getElementById("lessonNum").textContent = "Lesson " + String(id).padStart(2,"0");
      document.getElementById("lessonTitle").textContent = sim.title;
      document.title = `Lesson ${id} — ${sim.title} · Chello`;

      const labels = { http:"Sample Requests & Responses", deploy:"Deployment Walkthrough", console:"Simulated Output" };
      const outLabel = labels[sim.kind] || "Simulated Output";

      // Render the simulated output, highlighting user-typed input lines (» ...)
      const outHtml = sim.output.split("\n").map(line =>
        line.startsWith("» ")
          ? `<span class="input-line">${escapeHtml(line.slice(2))}</span>`
          : escapeHtml(line.replace(/» /g, ""))
      ).join("\n");

      content.innerHTML = `
        <div class="note">
          This page shows the lesson's <strong>real source code</strong> plus a
          <strong>simulated run</strong> — so you can see what it does without installing anything.
          To run it for real: <code>${escapeHtml(sim.cmd)}</code> in the lesson folder.
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>▶ ${outLabel}</h2>
            <button class="run-btn" id="runBtn">▶ Run</button>
          </div>
          <div class="term">
            <div class="term-bar">
              <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
              <span class="term-cmd">$ ${escapeHtml(sim.cmd)}</span>
            </div>
            <div class="term-body" id="termBody"></div>
          </div>
        </div>

        <div id="codePanels"></div>

        <div class="links">
          <a href="index.html">← Back to Dashboard</a>
          ${sim.files.map(f => `<a href="${GITHUB}${f}" target="_blank" rel="noopener">${f} on GitHub ↗</a>`).join("")}
        </div>
      `;

      // Typewriter "run" effect
      const termBody = document.getElementById("termBody");
      function play(){
        termBody.innerHTML = "";
        const full = outHtml;
        let i = 0;
        const speed = 6; // chars per tick
        const timer = setInterval(() => {
          i += speed;
          termBody.innerHTML = full.slice(0, i);
          termBody.scrollTop = termBody.scrollHeight;
          if (i >= full.length) { clearInterval(timer); termBody.innerHTML = full; }
        }, 12);
      }
      document.getElementById("runBtn").addEventListener("click", play);
      termBody.innerHTML = outHtml; // show immediately; Run replays with animation

      // Fetch and show each source file
      const codePanels = document.getElementById("codePanels");
      sim.files.forEach(path => {
        const panel = document.createElement("div");
        panel.className = "panel";
        panel.innerHTML = `
          <div class="panel-head">
            <h2>📄 Source Code</h2>
            <span class="file-name">${path}</span>
          </div>
          <pre><code class="language-${sim.lang}">Loading ${path} …</code></pre>`;
        codePanels.appendChild(panel);
        const codeEl = panel.querySelector("code");

        fetch(path)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
          .then(text => {
            codeEl.textContent = text;
            if (window.hljs) hljs.highlightElement(codeEl);
          })
          .catch(() => {
            codeEl.parentElement.outerHTML =
              `<div class="err" style="margin:16px;">Couldn't load <code>${path}</code> directly
               (browsers block <code>file://</code> reads). Run a local server
               (<code>python -m http.server 8080</code>) or
               <a href="${GITHUB}${path}" target="_blank" rel="noopener">view it on GitHub ↗</a>.</div>`;
          });
      });
    }

    function escapeHtml(s){
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
